<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="./style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto&display=swap" rel="stylesheet">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="./css/fontawesome.css" rel="stylesheet">
	<link href="./css/brands.css" rel="stylesheet">
	<link href="./css/solid.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

	<title>Meh Messenger</title>
</head>
<body id="mainBody">
	<div class="container2">
		<div class="header2">
			<h1 style="text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 50px;">Meh Messenger</h1>
		</div>
		<div class="content2 center2">
			<div id="middleContent">
				<div id="channelList">
					<div id="channelsHeader">
						<h3>Rooms</h3>
						<button id="addChannel" class="btn btn-primary">Add</button>
					</div>
					<div id="channels">
						<!-- Channels Here -->
					</div>
				</div>

				<div id="messagesContainer">
					<div id="messagesHeader">
						<h3 id="currentChannel">Select a room...</h3>
					</div>
					<div id="allMessages">						
						<!-- Messages Here -->
					</div>
				</div>
			</div>
		</div>
		<div class="footer2 center2">
			<button id="updateUser" class="btn2"><i class="fa fa-user"></i></button>
			<button id="sendMessage" class="btn2"><i class="fa fa-paper-plane"></i></button>
			<span id="messageBox">
				<input id="messageInput" type="text" name="message" placeholder="Send Message">
			</span>
		</div>
	</div>

	<script src="./firebase.js" type="module"></script>
	<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
