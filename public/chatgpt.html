<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meh Messenger</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Firebase JavaScript SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-database.js"></script>
  <style>
    body {
      overflow: hidden;
      background-color: #f8f9fa;
    }

    .navbar-dark .navbar-brand {
      color: #fff;
    }

    .form-switch {
      margin-left: 10px;
    }

    #message-container {
      max-height: 400px;
      overflow-y: scroll;
    }

    @media (max-width: 576px) {
      .container {
        padding-left: 15px;
        padding-right: 15px;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Meh Messenger</a>
      <div class="custom-control custom-switch">
        <input type="checkbox" class="custom-control-input" id="dark-mode-switch">
        <label class="custom-control-label" for="dark-mode-switch">Dark Mode</label>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="text-center">Simple Messaging App</h1>

    <div class="mb-4">
      <button id="change-name-button" class="btn btn-primary mt-2" data-toggle="modal"
        data-target="#changeNameModal">Change Name</button>
    </div>

    <div id="message-container">
      <!-- Messages will be displayed here -->
    </div>

    <div class="input-group mt-4">
      <input id="message-input" type="text" class="form-control" placeholder="Type your message...">
      <div class="input-group-append">
        <button id="send-button" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>

  <!-- Change Name Modal -->
  <div class="modal fade" id="changeNameModal" tabindex="-1" role="dialog" aria-labelledby="changeNameModalLabel"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="changeNameModalLabel">Change Display Name</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <input id="username-input" type="text" class="form-control" placeholder="Enter your display name...">
        </div>
        <div class="modal-footer">
          <button id="save-name-button" type="button" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: process.env.firebase_apiKey,
      authDomain: process.env.firebase_authDomain,
      projectId: process.env.firebase_projectId,
      storageBucket: process.env.firebase_storageBucket,
      messagingSenderId: process.env.firebase_messagingSenderId,
      appId: process.env.firebase_appId,
      measurementId: process.env.firebase_measurementId
    };
    firebase.initializeApp(firebaseConfig);

    // Get a reference to the messages collection in Firebase
    var messagesRef = firebase.database().ref('messages');

    // Display Name
    var displayName = '';

    // Save Name button click event handler
    document.getElementById('save-name-button').addEventListener('click', function () {
      var usernameInput = document.getElementById('username-input');
      var newDisplayName = usernameInput.value.trim();
      if (newDisplayName !== '') {
        displayName = newDisplayName;
        usernameInput.value = '';
        // Close the modal
        $('#changeNameModal').modal('hide');
      }
    });

    // Listen for incoming messages and display them
    messagesRef.on('child_added', function (snapshot) {
      var message = snapshot.val();
      displayMessage(message);
    });

    // Function to display a message in the message container
    function displayMessage(message) {
      var messageElement = document.createElement('div');
      messageElement.classList.add('alert', 'alert-info', 'my-2');
      messageElement.innerHTML = '<strong>' + message.username + ': </strong>' + message.text;
      document.getElementById('message-container').appendChild(messageElement);
    }

    // Send button click event handler
    document.getElementById('send-button').addEventListener('click', function () {
      var messageInput = document.getElementById('message-input');
      var messageText = messageInput.value.trim();
      if (messageText !== '') {
        // Push the new message to Firebase
        messagesRef.push({ username: displayName, text: messageText });
        // Clear the input field
        messageInput.value = '';
      }
    });

    // Enter key press event handler
    document.getElementById('message-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        document.getElementById('send-button').click();
      }
    });

    // Dark Mode switch change event handler
    document.getElementById('dark-mode-switch').addEventListener('change', function () {
      var body = document.body;
      if (this.checked) {
        body.classList.add('bg-dark');
        body.classList.add('text-light');
      } else {
        body.classList.remove('bg-dark');
        body.classList.remove('text-light');
      }
    });
  </script>

  <!-- Bootstrap JavaScript -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
